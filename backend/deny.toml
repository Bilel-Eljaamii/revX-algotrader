# cargo-deny configuration file
# This provides "ultimate safe" defaults for license compliance, vulnerability detection,
# and dependency hygiene.

[advisories]
vulnerability = "deny"
unmaintained = "none"
unsound = "none"
notice = "deny"
ignore = []

[licenses]
unlicensed = "deny"
# Deny all "copyleft" licenses to prevent accidental viral open-sourcing requirements
copyleft = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-3.0",
]

[[licenses.clarify]]
name = "ring"
expression = "ISC AND MIT AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0ced23 }
]

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
